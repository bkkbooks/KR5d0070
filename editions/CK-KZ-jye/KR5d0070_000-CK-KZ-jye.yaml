front:
  text: 我性旣肇稟受無殊圓圓大慧明明眞靈是時物不能萌其惡種塵不能隱于罪芽而其境澄明瑩然內觀我心無心湛然外鑒物形無形坦坦蕩蕩萬慮歸空豈不樂乎洎逐緣殢因忘前失後耽塵憂眷貪著其事日被三餐其心百變夜只一眠魂遊萬景馳神于嗜慾之鄕載靈在煩惱之界魂歌魄舞引奔死途意昧識迷背了生路如是之際眞可歎惜莫若灌漱靈泉先澆善根船泛法水次洗諸垢令我一性淨潔明白無掛無念圓圓不缺若秋月之當空湛湛無遮如白雲之離頂遂得空空不住實實無相覺入慧內明見大道是乃淨境之地也修命之人可至此界以心觀心以性見性神亦茫茫眞亦浩浩得之哉得之哉
  hash: sha256:359bcc65178ad2cf574b7ea74b848a4a326ef1459e96bba623ed8578a67abdab
