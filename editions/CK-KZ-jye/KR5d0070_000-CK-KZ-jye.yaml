  - {type: head, offset: 0, content: 太虛心淵篇, id: KR5d0070_CK-KZ-jye_000-h1, level: 1}
body:
  text: 我性旣肇受此含元性明明太一初純然根大朴全卽在玄虛稟受無殊均與沖和秀何曾品有殊强分爲大小所以遠眞無圓圓大慧妙見靈通遠無遮幸得圓精純藏大覺此最近天然明明眞靈自得秋蟾白靈光甚浩然浮雲應不蔽皎潔瑩當天不萌惡種徹底皆眞慧連根盡覺明纖塵無處起惡種豈能萌不隱罪芽純正無瑕玷靈光表裏清不容些小垢焉隱罪芽生內觀我心無心洞徹施眞慧觀心豈有心忘然歸寂境片念莫來臨外鑒物形無形眞象猶無象塵形怎可形圓空齊一照物我了然冥坦坦蕩蕩眞性無諸礙優游得自然天和俱不挫坦蕩又何邊萬慮歸空塵慮終爲幻相忘悉入空不能容一念月照碧潭中豈不樂乎世態與浮榮惟堪樂七情此般眞性得歡喜是難名逐緣𣨼因最是因緣重逐緣孽乃深昏沉天性暗旁被六塵侵耽塵憂眷旣抱親情久耽憂損太和不將清淨守煩惱更來多其心百變對物生機巧臨時百變心靈淵都一寸役得許多深魂遊萬景夢想顛來倒魂遊萬景中危難巇與險恐怖在於空馳神于嗜慾之鄕魂蕩神微弱馳神嗜慾鄕天眞兼慧覺聲色競荒茫載靈在煩惱之界眞性遭沉沒憂煩載一靈頭頭隨彼去焉得妙源庭魂歌魄舞耗了三明見全歸魂魄家晨昏歌與舞嬉戲向姦邪引奔死途不肯遊眞正甘心入死途靈元盡消滅陰魄得舒蘇意昧識迷意識俱遮障昏昏昧與迷情山兼愛海無復向眞躋背了生路明旣移爲昧還知背了生三元兼七寶任被八邪爭眞可歎惜大聖存仁恤深哀不悟人幽寃並重業箇箇是沉淪灌漱靈泉一勺湛然清靈泉浸上生汲來冥灌漱芽糵得充盈先澆善根得地根皆善封培又灌泉熙然滋脈潤茂鬱長靈田般泛法水水性俱趨下通流上要般冷然無壅滯洗滌又何難次洗諸垢垢穢於身染須憑法水清洗來三界淨閃出一圓明淨潔明白洗淨諸塵垢眞如淨潔明皎然羣昧破慧覺徹源清無掛無念意識無奔驟寧然勿繫牽此時諸事緒俱變一清泉圓圓不缺慧性復完就如初更不傷圓明何有缺皎皎一氷霜秋月當空素月當秋夜輝空滿一輪盈然天地白燦燦玉無塵湛湛無遮湛湛全清净澄明定莫遮六塵齊一拂爭敢有些些白雲離頂洩洩秋羅薄溶溶起玉峯無遮應不住明淨竟何從空空不住萬態何能掛超然悉入空圓圓寧有住浩浩燦靈通實實無相有相爲無相無形寄有形巍然存建立眞不喪其靈覺入慧内悟念俱開闢通流入慧中輝光無處暗皎白照眞空眀見大道内外都昭徹冥中得皎然慧觀明見道了了白雲天乃淨境之地淨境今登入明然一派清豁然無障礙廣大更充盈修命之人可至此界眞妙知修葺堪臨净渡中有無同一揆大道介然通以心觀心洞照凡心了他心此亦同眞觀爲自在浩浩燭諸空以性見性慧見無遮塞超然物我同湛歸無念裏明白覩眞空神亦茫茫巳得神明體幽微與性同茫茫爲我守久不落於空眞亦浩浩爲入無爲界眞元兩各同圓明俱浩浩大覺得玄通得之哉返僞修眞就因真又入空此名誠乃得得外更無功
