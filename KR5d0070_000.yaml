front:
  text: 太虛心淵篇我性既肇禀受無殊圓圓大慧明明真靈是時物不能萌其惡種塵不能隱于罪芽而其境澄明瑩然內觀我心無心湛然外鑒物形無形坦坦蕩蕩萬慮歸空豈不樂乎洎逐緣殢因忘前失後耽塵憂眷貪著其事日被三餐其心百變夜只一眠𩱿遊萬景馳神于嗜欲之鄉載靈在煩惱之界𩱿歌𩲸舞引奔死途意昧識迷背了生路如是之際真可歎惜莫若灌漱靈泉先澆善根船泛法水次洗諸垢令我一性净潔明白無掛無念圓圓不缺若秋月之當空湛湛無遮如白雲之離頂遂得空空不住實實無相覺入慧內明見大道是乃净境之地也修命之人可至此界以心觀心以性見性神亦茫茫真亦浩浩得之哉得之哉
  hash: sha256:fd74c644b661f6ffff5bee05f4832ab3277c0eee2aa395e760f5245628bf6ea5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0070_HFL_000-001a, image: hfl/0725/0725-028.png}
body:
  text: 我性既肇受此含元性明明太一初純然根大朴全即在玄虛禀受無殊均與沖和秀何曾品有殊强分為大小所以逺真無圓圓大慧妙見靈通逺無遮幸得圓精純藏大覺此最近天然眀眀真靈自得秋蟾白靈光甚浩然浮雲應不蔽皎潔瑩當天不萌惡種徹底皆真慧連根盡覺明纖塵無處起惡種豈能萌不隱罪芽純正無瑕玷靈光表裏清不容些小垢焉隱罪芽生內觀我心無心洞徹施真慧觀心豈有心忘然歸寂境片念莫來臨外鑒物形無形真象猶無象塵形怎可形圓空齊一照物我了然冥坦坦蕩蕩真性無諸礙優游得自然天和俱不挫坦蕩又何邊萬慮歸空塵慮終為幻相忘悉入空不能容一念月照碧潭中豈不樂乎世態與浮榮惟堪樂七情此般真性得歡喜是難名逐緣𣨼因最是因緣重逐緣孽乃深昏沉天性暗旁被六塵侵耽塵憂眷既抱親情久耽憂損太和不將清净守煩惱更來多其心百變對物生機巧臨時百變心靈淵都一寸役得許多深𩱿遊萬景夢想顛來倒𩱿遊萬景中危難巇與嶮恐怖在於空馳神于嗜欲之鄉𩲸蕩神微弱馳神嗜欲鄉天真兼慧覺聲色競荒亡載靈在煩惱之界真性遭沉沒憂煩載一靈頭頭隨彼去焉得妙源庭𩱿歌𩲸舞耗了三明見全歸𩲸𩱿家晨昏歌與舞嬉戲向姦邪引奔死途不肯遊真正甘心入死途靈元盡消滅陰𩲸得舒蘇意昧識迷意識俱遮障昏昏昧與迷情山兼愛海無復向真躋背了生路明既移為昧還知背了生三元兼七寶任被八邪爭真可歎惜大聖存仁恤深哀不悟人幽寃並重業箇箇是沉淪灌漱靈泉一勺湛然清靈泉浸上生汲來冥灌漱芽糵得充盈先澆善根得地根皆善封培又灌泉熙然滋脉潤茂鬱長靈田般泛法水水性俱趨下通流上要般冷然無壅滯洗滌又何難次洗諸垢垢穢於身染須憑法水清洗來三界净閃出一圓明净潔明白洗净諸塵垢真如净潔明皎然羣昧破慧覺徹源清無掛無念意識無奔驟寧然勿繫牽此時諸事緒俱變一清泉圓圓不缺慧性復完就如初更不傷圓明何有缺皎皎一冰霜秋月當空素月當秋夜輝空滿一輪盈然天地白燦燦玉無塵湛湛無遮湛湛全清净澄明定莫遮六塵齊一拂爭敢有些些白雲離頂泄泄秋羅薄溶溶起玉峯無遮應不住明淨竟何從空空不住萬態何能掛超然悉入空圓圓寧有住浩浩燦靈通實實無相有相為無相無形寄有形巍然存建立真不喪其靈覺入慧內悟念俱開闢通流入慧中輝光無處暗皎白照真空眀見大道內外都昭徹冥中得皎然慧觀明見道了了白雲天乃淨境之地淨境今登入明然一派清豁然無障礙廣大更充盈修命之人可至此界真妙知修葺堪臨净渡中有無同一揆大道介然通以心觀心洞照凡心了他心此亦同真觀為自在浩浩燭諸空以性見性慧見無遮塞超然物我同湛歸無念裏明白覩真空神亦茫茫巳得神明體幽微與性同茫茫為我守久不落於空真亦浩浩為入無為界真元兩各同圓明俱浩浩大覺得玄通得之哉返僞修真就因真又入空此名誠乃得得外更無功太虛心淵篇
  hash: sha256:b1fda26b2cf3a761190bb7e2c78880b78282f4f5e30cc5402e450d89c613edea
